<!DOCTYPE html>
<html lang="am">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ኢብር - የብድር ማመልከቻ</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        html,
        body {
            height: 100%;
            font-family: 'Inter', sans-serif;
            background: #f5f5f5;
            overflow: hidden;
        }
        
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
        }
        /* ======== HEADER IMAGE — fills 100% of header space ======== */
        
        .header-container {
            position: relative;
            width: 100%;
            max-width: 480px;
            height: clamp(180px, 30vw, 265px);
            overflow: hidden;
            background: #fff;
            margin-bottom: clamp(10px, 3vw, 20px);
        }
        
        .header-img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Fills entire container, crops if needed */
            object-position: center;
            display: block;
        }
        
        .card {
            background: white;
            border-radius: 24px;
            padding: 40px 30px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }
        
        .form-title {
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            margin-bottom: 20px;
        }
        
        .progress-bar {
            width: 180px;
            height: 6px;
            background: #e0e0e0;
            border-radius: 3px;
            margin: 30px auto;
            overflow: hidden;
        }
        
        .progress-fill {
            width: 33.33%;
            height: 100%;
            background: linear-gradient(to right, #00a550, #18da89);
        }
        
        .step-text {
            text-align: center;
            color: #777;
            font-size: 15px;
            margin-bottom: 30px;
        }
        
        .form-label {
            display: block;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            font-size: 15px;
        }
        
        .form-select,
        .form-input,
        .form-textarea {
            width: 100%;
            padding: 16px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 16px;
            margin-bottom: 24px;
            transition: border 0.3s;
        }
        
        .form-select:focus,
        .form-input:focus,
        .form-textarea:focus {
            border-color: #00a550;
            outline: none;
        }
        
        .invalid {
            border-color: #e74c3c !important;
        }
        
        .next-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(to right, #00a550, #21e493);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            margin-top: auto;
        }
        
        footer {
            padding: 20px;
            color: #aaa;
            font-size: 13px;
            text-align: center;
            margin-top: auto;
        }
    </style>
</head>

<body>
    <!-- Header — image fills 100% of the space -->
    <div class="header-container">
        <img class="header-img" src="ebirr.jpeg" alt="ኢብር ራስጌ">
    </div>

    <main class="card">
        <h1 class="form-title">የብድር ማመልከቻ</h1>
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        <div class="step-text">ደረጃ 1 ከ 3</div>

        <label class="form-label">የብድር አይነት</label>
        <select class="form-select" id="loanType">
            <option>የግል ብድር</option>
            <option>የንግድ ብድር</option>
            <option>የቤት ብድር</option>
            <option>የመኪና ብድር</option>
            <option>የትምህርት ብድር</option>
        </select>

        <label class="form-label">የብድር መጠን (ብር)</label>
        <input type="number" class="form-input" id="loanAmount" placeholder="5000" min="100" max="5000">

        <label class="form-label">የብድር ጊዜ</label>
        <select class="form-select" id="loanTerm">
            <option>6 ወራት</option>
            <option>12 ወራት</option>
            <option>18 ወራት</option>
            <option>24 ወራት</option>
            <option>36 ወራት</option>
            <option>48 ወራት</option>
            <option>60 ወራት</option>
        </select>

        <label class="form-label">የብድር አላማ</label>
        <textarea class="form-textarea" id="loanPurpose" placeholder="ብድሩን ለምን ይጠቀማሉ?"></textarea>

        <button class="next-btn" id="nextBtn">ቀጣይ ደረጃ</button>
    </main>
    <footer>© 2025 ኢብር</footer>

    <script>
        // Pre-fill
        if (localStorage.getItem('loanAmount')) document.getElementById('loanAmount').value = localStorage.getItem('loanAmount');
        if (localStorage.getItem('loanTerm')) document.getElementById('loanTerm').value = localStorage.getItem('loanTerm') + ' ወራት';

        document.getElementById('nextBtn').addEventListener('click', function() {
            const amount = document.getElementById('loanAmount').value.trim();
            const purpose = document.getElementById('loanPurpose').value.trim();

            let valid = true;
            document.querySelectorAll('.form-input, .form-textarea').forEach(el => el.classList.remove('invalid'));

            if (!amount || amount < 100) {
                document.getElementById('loanAmount').classList.add('invalid');
                valid = false;
            }
            if (!purpose) {
                document.getElementById('loanPurpose').classList.add('invalid');
                valid = false;
            }

            if (!valid) {
                alert('እባክዎ አስፈላጊዎቹን መስኮች ይሙሉ።');
                return;
            }

            localStorage.setItem('loanType', document.getElementById('loanType').value);
            localStorage.setItem('loanAmount', amount);
            localStorage.setItem('loanTerm', document.getElementById('loanTerm').value.replace(' ወራት', ''));
            localStorage.setItem('loanPurpose', purpose || 'አልተገለጸም');

            window.location.href = 'details.html';
        });
    </script>
</body>

</html>
